name: Audit Slack Notify

# Déclenché quand une routine remote (cto-revold ou revenue-strategist)
# commit un nouveau fichier d'audit dans audits/. Lit le fichier, extrait
# le résumé et poste sur le canal Slack #alerte-revold.
#
# Workaround : le sandbox CCR Anthropic bloque hooks.slack.com. Donc les
# routines commit + push, et c'est GitHub Actions (qui lui n'est pas en
# sandbox) qui poste sur Slack.

on:
  push:
    branches: [main]
    paths:
      - 'audits/**.md'

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Pour diff HEAD^..HEAD

      - name: Find newly added audit files
        id: find
        run: |
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD^ HEAD -- 'audits/*.md' || true)
          if [ -z "$NEW_FILES" ]; then
            echo "files=" >> $GITHUB_OUTPUT
            echo "No new audit files in this push"
          else
            # Compact en single-line séparé par espaces (compat shell loop)
            FILES_ONELINE=$(echo "$NEW_FILES" | tr '\n' ' ')
            echo "files=$FILES_ONELINE" >> $GITHUB_OUTPUT
            echo "Found new audit files: $FILES_ONELINE"
          fi

      - name: Post to Slack for each audit
        if: steps.find.outputs.files != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          USER_ID: U09GKQJMZ0D
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::error::SLACK_WEBHOOK_URL secret not set in GitHub repo settings"
            exit 1
          fi

          for FILE in ${{ steps.find.outputs.files }}; do
            echo "Processing $FILE..."

            # Détection du type d'audit depuis le filename
            TYPE="audit"
            EMOJI="📊"
            case "$FILE" in
              *cto*) TYPE="Audit CTO Revold quotidien"; EMOJI="📊" ;;
              *revenue*) TYPE="Audit Revenue Intelligence hebdomadaire"; EMOJI="💰" ;;
              *marketplace*) TYPE="Audit Marketplace"; EMOJI="🏪" ;;
              *roadmap*) TYPE="Mise à jour roadmap"; EMOJI="🗺️" ;;
            esac

            # Titre H1 du fichier (ou fallback sur filename)
            TITLE=$(grep -m1 "^# " "$FILE" | sed 's/^# //' || basename "$FILE" .md)

            # Extrait les ~1500 premiers chars du contenu (hors titre H1)
            EXCERPT=$(awk '/^# /{f=1;next} f' "$FILE" | head -c 1500)

            # URL vers le fichier sur GitHub
            FILE_URL="https://github.com/${REPO}/blob/${SHA}/${FILE}"

            # Construction du payload Slack avec jq pour échapper proprement
            PAYLOAD=$(jq -n \
              --arg emoji "$EMOJI" \
              --arg type "$TYPE" \
              --arg title "$TITLE" \
              --arg excerpt "$EXCERPT" \
              --arg file_url "$FILE_URL" \
              --arg user_id "$USER_ID" \
              '{
                blocks: [
                  {
                    type: "header",
                    text: {type: "plain_text", text: ($emoji + " " + $type)}
                  },
                  {
                    type: "section",
                    text: {type: "mrkdwn", text: ("*" + $title + "*\n\n" + $excerpt + "...")}
                  },
                  {
                    type: "actions",
                    elements: [
                      {
                        type: "button",
                        text: {type: "plain_text", text: "Voir le rapport complet"},
                        url: $file_url
                      }
                    ]
                  }
                ]
              }')

            # POST vers Slack
            HTTP_CODE=$(curl -sS -o /tmp/slack_response.txt -w "%{http_code}" \
              -X POST -H "Content-type: application/json" \
              --data "$PAYLOAD" \
              "$SLACK_WEBHOOK_URL")

            if [ "$HTTP_CODE" != "200" ]; then
              echo "::error::Slack POST failed for $FILE — HTTP $HTTP_CODE"
              cat /tmp/slack_response.txt
              exit 1
            fi

            echo "✓ $FILE posted to Slack (HTTP $HTTP_CODE)"
          done
