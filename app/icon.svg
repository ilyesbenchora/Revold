<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="48" height="48" rx="12" fill="url(#bg)"/>

  <!-- R blanc bold centré -->
  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="30" font-weight="900" fill="white" letter-spacing="-1">R</text>

  <!-- Pastille blanche avec flèche ↗ fuchsia -->
  <circle cx="38" cy="10" r="7" fill="white"/>
  <g stroke="#c026d3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="35" y1="13" x2="41" y2="7"/>
    <polyline points="36.5,7 41,7 41,11.5"/>
  </g>
</svg>
