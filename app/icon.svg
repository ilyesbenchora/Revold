<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="48" height="48" rx="12" fill="url(#g)"/>
  <g stroke="white" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Spine vertical du R - dominant -->
    <line x1="11" y1="9" x2="11" y2="38" stroke-width="5.6"/>
    <!-- Barre horizontale haute -->
    <line x1="11" y1="9" x2="35" y2="9" stroke-width="5.2"/>
    <!-- Diagonale du bowl (top-right -> centre) -->
    <line x1="35" y1="9" x2="22" y2="23.5" stroke-width="4.8"/>
    <!-- Barre horizontale milieu (ferme le bowl du R) -->
    <line x1="11" y1="23.5" x2="22" y2="23.5" stroke-width="4.8"/>
    <!-- Jambe du R -->
    <line x1="22" y1="23.5" x2="37" y2="38" stroke-width="4.8"/>
    <!-- Trait fin bas - base du sablier -->
    <line x1="11" y1="40" x2="37" y2="40" stroke-width="1.8"/>
  </g>
</svg>
