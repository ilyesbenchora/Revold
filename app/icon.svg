<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="48" height="48" rx="12" fill="url(#g)"/>
  <g stroke="white" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Spine vertical du R -->
    <line x1="11" y1="9" x2="11" y2="39" stroke-width="4.5"/>
    <!-- Barre horizontale haute = cap supérieur du sablier -->
    <line x1="10" y1="9" x2="38" y2="9" stroke-width="4.2"/>
    <!-- Triangle supérieur rempli (sable) -->
    <path d="M11 10 L37 10 L24 23 Z" fill="white" stroke-width="0"/>
    <!-- Triangle inférieur outline -->
    <path d="M11 38 L24 23 L37 38" stroke-width="3.8"/>
    <!-- Trait fin bas qui ferme le sablier -->
    <line x1="10.5" y1="39" x2="38" y2="39" stroke-width="1.6"/>
  </g>
</svg>
