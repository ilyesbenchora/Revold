<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="40" fill="url(#g)"/>
  <g stroke="white" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Spine vertical du R -->
    <line x1="42" y1="34" x2="42" y2="146" stroke-width="17"/>
    <!-- Barre horizontale haute = cap supérieur du sablier -->
    <line x1="38" y1="34" x2="142" y2="34" stroke-width="16"/>
    <!-- Triangle supérieur rempli (sable) -->
    <path d="M42 38 L138 38 L90 88 Z" fill="white" stroke-width="0"/>
    <!-- Triangle inférieur outline -->
    <path d="M42 142 L90 88 L138 142" stroke-width="14"/>
    <!-- Trait fin bas qui ferme le sablier -->
    <line x1="40" y1="146" x2="142" y2="146" stroke-width="6"/>
  </g>
</svg>
