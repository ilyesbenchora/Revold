<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>

  <!-- R blanc bold centré -->
  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="112" font-weight="900" fill="white" letter-spacing="-4">R</text>

  <!-- Pastille blanche avec flèche ↗ fuchsia -->
  <circle cx="142" cy="38" r="26" fill="white"/>
  <g stroke="#c026d3" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="131" y1="49" x2="153" y2="27"/>
    <polyline points="136,27 153,27 153,44"/>
  </g>
